<script>
        // Simple navigation micro-interaction simulator
        function navigate(view) {
            console.log("Navigating to: " + view);
            // Visual feedback
            const feedback = document.createElement('div');
            feedback.className = 'fixed inset-0 bg-primary/20 z-[100] backdrop-blur-sm flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300';
            feedback.innerHTML = `<div class="bg-white p-6 rounded-3xl shadow-2xl scale-50 transition-transform duration-300 transform-gpu" id="fb-content"><p class="font-bold text-primary text-xl">Loading ${view}...</p></div>`;
            document.body.appendChild(feedback);
            
            requestAnimationFrame(() => {
                feedback.classList.remove('opacity-0');
                document.getElementById('fb-content').classList.remove('scale-50');
            });

            setTimeout(() => {
                feedback.classList.add('opacity-0');
                document.getElementById('fb-content').classList.add('scale-50');
                setTimeout(() => feedback.remove(), 300);
            }, 800);
        }

        // Add subtle parallax to the account hero
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.ambient-orb');
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            
            orbs.forEach(orb => {
                orb.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
