</div>

<script>
        // Micro-interactions for the empty state
        document.querySelector('.animate-float').addEventListener('click', function() {
            this.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            this.style.transform = 'scale(0.9) rotate(-5deg)';
            setTimeout(() => {
                this.style.transform = '';
            }, 400);
        });
